name: Sync to GitHub Mirror

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  sync-github:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: https://git.kesongs.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main and release to GitHub
        env:
          GITHUB_PUSH_TOKEN: ${{ secrets.MY_GITHUB_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITHUB_PUSH_TOKEN}" ]; then
            echo "ERROR: missing MY_GITHUB_PUSH_TOKEN secret in repo settings"
            exit 1
          fi

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git fetch origin main release

          REMOTE="https://x-access-token:${GITHUB_PUSH_TOKEN}@github.com/ZhenlyChen/YuanQiSeoWeb.git"

          echo "Pushing origin/main -> github/main"
          git push "${REMOTE}" origin/main:main

          echo "Pushing origin/release -> github/release"
          git push "${REMOTE}" origin/release:release
